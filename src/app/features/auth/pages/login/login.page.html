<div class="login-container">
  <h1>{{ pageTitle }}</h1>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input 
      type="email" 
      id="email" 
      [formControl]="emailControl" 
      placeholder="Enter your email"
    />
  </div>

  <p>Live Typing Output: <strong>{{ emailControl.value }}</strong></p>
</div>
